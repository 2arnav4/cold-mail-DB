services:
  - type: web
    name: cold-mail-tracker
    runtime: python
    buildCommand: pip install -r tracker/requirements.txt
    startCommand: gunicorn --chdir tracker app:app
    envVars:
      - key: DB_PATH
        value: /var/data/tracker.db
    disk:
      name: tracker-data
      mountPath: /var/data
      sizeGB: 1
